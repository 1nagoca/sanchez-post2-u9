<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <h1 class="login-title">Iniciar Sesión</h1>

            <div th:if="${param.error}" class="alert alert-error">
                Correo o contraseña incorrectos
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                Sesión cerrada correctamente
            </div>
            <div th:if="${param.registrado}" class="alert alert-success">
                Registro exitoso. Inicia sesión con tus credenciales
            </div>

            <form th:action="@{/login}" method="post" class="login-form">
                <div class="form-group">
                    <input type="email" name="username" required
                           placeholder="Correo electrónico" class="form-control">
                </div>

                <div class="form-group">
                    <input type="password" name="password" required
                           placeholder="Contraseña" class="form-control">
                </div>

                <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
            </form>

            <div class="login-footer">
                <a th:href="@{/registro}" class="link">Crear cuenta</a>
            </div>
        </div>
    </div>
</body>
</html>
