<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <h1 class="login-title">Crear Cuenta</h1>

            <form th:action="@{/registro}" method="post" class="login-form" th:object="${usuario}">
                <div class="form-group">
                    <label>
                        Nombre completo
                        <input type="text" th:field="*{nombre}" required
                               placeholder="Nombre completo" class="form-control">
                    </label>
                    <span th:if="${#fields.hasErrors('nombre')}" class="error-text" th:errors="*{nombre}"></span>
                </div>

                <div class="form-group">
                    <label>
                        Correo electrónico
                        <input type="email" th:field="*{email}" required
                               placeholder="Correo electrónico" class="form-control">
                    </label>
                    <span th:if="${#fields.hasErrors('email')}" class="error-text" th:errors="*{email}"></span>
                </div>

                <div class="form-group">
                    <label>
                        Contraseña
                        <input type="password" th:field="*{contrasenia}" required
                               placeholder="Contraseña" class="form-control">
                    </label>
                    <span th:if="${#fields.hasErrors('contrasenia')}" class="error-text" th:errors="*{contrasenia}"></span>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Registrarse</button>
            </form>

            <div class="login-footer">
                <a th:href="@{/login}" class="link">Ya tengo cuenta</a>
            </div>

            <div style="margin-top: 16px; text-align: center;">
                <a th:href="@{/login}" class="btn btn-secondary" style="display: inline-block;">
                    ← Volver al login
                </a>
            </div>
        </div>
    </div>
</body>
</html>
